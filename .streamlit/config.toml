# Production configuration for Streamlit Community Cloud.
# Secrets do NOT live here - they go in the Cloud "Secrets" UI (or a local
# .streamlit/secrets.toml, which is git-ignored).

[server]
headless = true

[browser]
gatherUsageStats = false

[theme]
# Old-money day palette: ivory paper, racing-green ink, antique-gold accent.
# The in-app day/night toggle (quiz_app._apply_theme_css) layers on top.
primaryColor = "#A67C2E"
backgroundColor = "#F5EFE1"
secondaryBackgroundColor = "#ECE3CC"
textColor = "#2C2A1E"
font = "serif"
